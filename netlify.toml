[build]
  command = "vite build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/codes"
  to = "/.netlify/functions/codes"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
